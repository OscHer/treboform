#Now creates a template to organize the host.

template(name="SecondaryLogging" type="list") {
	constant(value= # "/var/log/rsyslog/")
    	property(name="HOSTNAME")
    	constant(value="/")
    	property(name="programname" SecurePath="replace")
    	constant(value=".log")
    	}
*.* ?SecondaryLogging
