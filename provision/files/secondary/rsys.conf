# This script modifies the host rsyslog to receive the logs from other machines

#Open port 514 to tcp connections

module(load="imtcp")
input(type="imtcp" port="514")


# A template to organize logs by hostnames and date.

$template DynamicFolder, "/var/log/sl/%HOSTNAME%/%$YEAR%-%$MONTH%-%$DAY%.log"
    
local0.=notice 		?DynamicFolder
